# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: false
  commands:
    lint:
      glob: "*.{js,ts}"
      run: npm run lint
    format:
      glob: "*.{js,ts,json}"
      run: npm run format
    type-check:
      run: npm run tsc
    test:
      run: npm run test:cov

commit-msg:
  commands:
    "conventional-commits":
      run: npx --yes --package @commitlint/cli --package @commitlint/config-conventional commitlint --edit {1}
